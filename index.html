<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelby AI Prompt Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #fff; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 0 25px rgba(236, 72, 153, 0.5); }
    .hero-bg {
      background-image: url('hero-bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .logo-container { display: flex; align-items: center; gap: 14px; }
    .robot { font-size: 42px; color: #ff1493; animation: glow-pulse 2.2s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #ff69b4); }
    .shelby-text { font-size: 32px; font-weight: 900; color: #ff1493; text-shadow: 0 0 10px #ff69b4, 0 0 25px #ff1493, 0 0 45px #ec4899, 0 0 70px #ff1493; animation: glow-pulse 2.2s ease-in-out infinite alternate; }
    @keyframes glow-pulse { from { text-shadow: 0 0 8px #ff69b4, 0 0 20px #ff1493; } to { text-shadow: 0 0 20px #ff69b4, 0 0 45px #ff1493, 0 0 75px #ec4899, 0 0 100px #ff1493; } }
  </style>
</head>
<body class="font-sans">

  <!-- Navbar -->
  <nav class="bg-black border-b border-pink-500 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="logo-container">
        <i class="fa-solid fa-robot robot"></i>
        <span class="shelby-text">Shelby Prompts</span>
      </div>
      <div class="flex items-center gap-6">
        <button onclick="connectWallet()" id="walletBtn" class="bg-pink-600 hover:bg-pink-700 px-6 py-2 rounded-full font-medium flex items-center gap-2">
          <i class="fa-solid fa-wallet"></i> Connect Petra
        </button>
        <div id="walletAddress" class="text-sm text-green-400 font-mono hidden"></div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg relative py-32 text-center overflow-hidden">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="max-w-4xl mx-auto px-6 relative z-10">
      <h2 class="text-5xl font-bold mb-4 neon text-pink-400">AI Prompt Marketplace on Shelby Testnet</h2>
      <p class="text-xl text-pink-300 mb-8">Upload • Price • Earn • Verified on Aptos</p>
      <p class="text-pink-400 text-lg">Anyone with a Petra wallet can sell prompts. Real money. Real proof.</p>
    </div>
  </section>

  <!-- Gallery with Search -->
  <section class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
      <h3 class="text-3xl font-bold flex items-center gap-3 text-pink-400">
        <i class="fa-solid fa-store"></i> Browse Prompts
      </h3>
      <div class="relative w-full md:w-96">
        <input id="searchInput" 
               onkeyup="filterPrompts()" 
               type="text" 
               placeholder="Search prompts... (title or content)"
               class="w-full bg-zinc-900 border border-pink-500 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-pink-400">
        <i class="fa-solid fa-magnifying-glass absolute right-6 top-1/2 -translate-y-1/2 text-pink-400"></i>
      </div>
    </div>
    <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </section>

  <!-- Upload -->
  <section class="bg-zinc-950 py-16">
    <div class="max-w-3xl mx-auto px-6">
      <h3 class="text-3xl font-bold mb-8 text-center text-pink-400">Upload Your Prompt & Earn</h3>
      <div class="bg-zinc-900 p-8 rounded-2xl border border-pink-500">
        <input id="title" type="text" placeholder="Prompt Title" class="w-full mb-4 px
