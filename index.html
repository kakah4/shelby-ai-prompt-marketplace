<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelby AI Prompt Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <h1>🧠 Shelby AI Prompt Marketplace</h1>
        <button onclick="connectWallet()">Connect Wallet</button>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Buy & Sell AI Prompts</h2>
        <p>Monetize your prompts on-chain with Shelby + Aptos</p>
    </section>

    <!-- ACTIONS -->
    <section class="actions">
        <button onclick="uploadPrompt()">Upload Prompt</button>
        <button onclick="viewMarketplace()">View Marketplace</button>
    </section>

    <!-- MARKETPLACE -->
    <section id="marketplace">
        <h2>Available Prompts</h2>
        <div class="prompt-card">
            <h3>🔥 Viral Tweet Generator</h3>
            <p>Price: 0.5 APT</p>
            <button onclick="unlockPrompt()">Unlock</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
